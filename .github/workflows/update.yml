name: Update APK Repository

on:
  repository_dispatch:
    types: [update-sql-pipe]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v, e.g. 0.7.0)"
        required: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy APK repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Resolve version
        id: vars
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download .apk packages
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          mkdir -p site/x86_64 site/aarch64
          for APK_ARCH in x86_64 aarch64; do
            FILE="sql-pipe_${VERSION}_${APK_ARCH}.apk"
            URL="https://github.com/vmvarela/sql-pipe/releases/download/v${VERSION}/${FILE}"
            if curl -fsSL "${URL}" -o "site/${APK_ARCH}/${FILE}" 2>/dev/null; then
              echo "Downloaded ${FILE}"
            else
              echo "Skipped ${FILE} (not available)"
            fi
          done
          ls -laR site/

      - name: Write public key
        env:
          APK_SIGNING_KEY_PUB: ${{ secrets.APK_SIGNING_KEY_PUB }}
        run: |
          if [ -n "${APK_SIGNING_KEY_PUB}" ]; then
            printf '%s\n' "${APK_SIGNING_KEY_PUB}" > site/vmvarela.rsa.pub
            echo "Public key written ($(wc -c < site/vmvarela.rsa.pub) bytes)"
          else
            echo "::warning::APK_SIGNING_KEY_PUB not set — skipping public key"
          fi

      - name: Generate APKINDEX and sign (Alpine Docker)
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/site:/repo" \
            -e APK_SIGNING_KEY="${APK_SIGNING_KEY}" \
            alpine:latest sh << 'ALPINE'
          set -e
          apk add --no-cache abuild

          for ARCH in x86_64 aarch64; do
            cd /repo/${ARCH}
            APKS=$(ls *.apk 2>/dev/null || true)
            if [ -z "${APKS}" ]; then
              echo "No .apk files in ${ARCH}, skipping"
              cd /repo
              continue
            fi

            if [ -n "${APK_SIGNING_KEY}" ]; then
              KEY_FILE="/tmp/vmvarela.rsa"
              printf '%s\n' "${APK_SIGNING_KEY}" > "${KEY_FILE}"
              chmod 600 "${KEY_FILE}"
              apk index --rewrite-arch ${ARCH} -o APKINDEX.tar.gz ${APKS}
              abuild-sign -k "${KEY_FILE}" APKINDEX.tar.gz
              echo "Signed APKINDEX for ${ARCH}"
            else
              apk index --rewrite-arch ${ARCH} -o APKINDEX.tar.gz ${APKS}
              echo "::warning::APK_SIGNING_KEY not set — APKINDEX unsigned"
            fi
            cd /repo
          done
          ALPINE

          # Fix permissions on files written by root inside Docker
          sudo chown -R "$USER" site/ 2>/dev/null || true

      - name: Create index page
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>vmvarela APK repository</title></head>
          <body>
          <h1>vmvarela APK repository</h1>
          <h2>Installation (Alpine Linux)</h2>
          <pre>
          wget -qO /etc/apk/keys/vmvarela.rsa.pub \
            https://vmvarela.github.io/apk-packages/vmvarela.rsa.pub
          echo "https://vmvarela.github.io/apk-packages" >> /etc/apk/repositories
          apk update &amp;&amp; apk add sql-pipe
          </pre>
          </body>
          </html>
          HTML

      - name: List site contents
        run: find site/ -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
