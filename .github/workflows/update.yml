name: Update APK Repository

on:
  repository_dispatch:
    types: [update-sql-pipe]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v, e.g. 0.7.0)"
        required: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy APK repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Resolve version
        id: vars
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download .apk packages
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          mkdir -p site/x86_64 site/aarch64
          for APK_ARCH in x86_64 aarch64; do
            FILE="sql-pipe_${VERSION}_${APK_ARCH}.apk"
            URL="https://github.com/vmvarela/sql-pipe/releases/download/v${VERSION}/${FILE}"
            if curl -fsSL "${URL}" -o "site/${APK_ARCH}/${FILE}" 2>/dev/null; then
              echo "Downloaded ${FILE}"
            else
              echo "Skipped ${FILE} (not available)"
            fi
          done

      - name: Generate APKINDEX (Alpine Docker)
        run: |
          # nfpm APKs lack builddate/origin in .PKGINFO, so apk index omits t:/o:.
          # We post-process the APKINDEX inside the container to add them before
          # repacking, so Alpine's apk accepts the resulting tar.gz as valid.
          cat > /tmp/make_apkindex.sh << 'SCRIPT'
          #!/bin/sh
          set -e
          TS=$(date +%s)
          for ARCH in x86_64 aarch64; do
            APK_COUNT=$(ls /repo/${ARCH}/*.apk 2>/dev/null | wc -l)
            if [ "${APK_COUNT}" -eq 0 ]; then
              echo "No .apk files in ${ARCH}, skipping"
              continue
            fi
            # Generate raw APKINDEX (allow-untrusted = skip package sig check)
            apk --allow-untrusted index \
              --description "vmvarela APK repository" \
              --rewrite-arch "${ARCH}" \
              -o /tmp/APKINDEX_raw.tar.gz \
              /repo/${ARCH}/*.apk

            # Extract, patch missing fields, repack
            mkdir -p /tmp/apkwork && cd /tmp/apkwork
            tar -xzf /tmp/APKINDEX_raw.tar.gz

            # Add o: (origin = pkgname) and t: (build timestamp) after m: line
            # These are absent from nfpm-generated .PKGINFO but required by apk
            awk -v ts="${TS}" '
              /^P:/ { pkgname=substr($0,3) }
              /^m:/ { print; printf "o:%s\nt:%s\n", pkgname, ts; next }
              { print }
            ' APKINDEX > APKINDEX.new && mv APKINDEX.new APKINDEX

            tar -czf "/repo/${ARCH}/APKINDEX.tar.gz" DESCRIPTION APKINDEX
            echo "Created APKINDEX for ${ARCH}: $(wc -c < /repo/${ARCH}/APKINDEX.tar.gz) bytes"
            cd /
          done
          SCRIPT
          chmod +x /tmp/make_apkindex.sh

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/site:/repo" \
            -v "/tmp/make_apkindex.sh:/make_apkindex.sh:ro" \
            alpine:latest sh /make_apkindex.sh

          # Fix ownership (Docker container runs as root)
          sudo chown -R "${USER}:${USER}" "${GITHUB_WORKSPACE}/site/"
          ls -laR site/

      - name: Sign APKINDEX
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
          APK_SIGNING_KEY_PUB: ${{ secrets.APK_SIGNING_KEY_PUB }}
        run: |
          if [ -z "${APK_SIGNING_KEY}" ]; then
            echo "::warning::APK_SIGNING_KEY not set — APKINDEX will be unsigned"
            exit 0
          fi

          KEY_FILE="/tmp/vmvarela.rsa"
          printf '%s\n' "${APK_SIGNING_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"

          # Distribute public key
          printf '%s\n' "${APK_SIGNING_KEY_PUB}" > site/vmvarela.rsa.pub

          # Python script: sign the gzip bytes (SHA1+RSA), then repack into a
          # single tar.gz stream — sig entry first, then original entries.
          # abuild-sign produces this exact format; two-stream concatenation
          # (the previous approach) is rejected by apk-tools 3.x.
          cat > /tmp/sign_apkindex.py << 'PYEOF'
          import tarfile, io, subprocess, sys, os
          key_file, pub_name, index_path = sys.argv[1], sys.argv[2], sys.argv[3]

          # Sign the unsigned APKINDEX.tar.gz (gzip bytes)
          sig_file = '/tmp/apk.sig'
          subprocess.run(
              ['openssl', 'dgst', '-sha1', '-sign', key_file, '-out', sig_file, index_path],
              check=True)
          sig = open(sig_file, 'rb').read()
          orig = open(index_path, 'rb').read()

          # Build single gzip+tar stream: .SIGN.RSA.<pubname> then original entries
          buf = io.BytesIO()
          with tarfile.open(fileobj=buf, mode='w:gz') as out:
              info = tarfile.TarInfo(f'.SIGN.RSA.{pub_name}')
              info.size = len(sig)
              out.addfile(info, io.BytesIO(sig))
              with tarfile.open(fileobj=io.BytesIO(orig), mode='r:gz') as src:
                  for m in src.getmembers():
                      data = src.extractfile(m).read()
                      ti = tarfile.TarInfo(m.name)
                      ti.size = len(data)
                      out.addfile(ti, io.BytesIO(data))

          open(index_path, 'wb').write(buf.getvalue())
          print(f"Signed {index_path}: {len(buf.getvalue())} bytes")
          PYEOF

          for ARCH in x86_64 aarch64; do
            INDEX="site/${ARCH}/APKINDEX.tar.gz"
            [ -f "${INDEX}" ] || continue
            python3 /tmp/sign_apkindex.py "${KEY_FILE}" vmvarela.rsa.pub "${INDEX}"
          done

      - name: Create index page
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>vmvarela APK repository</title></head>
          <body>
          <h1>vmvarela APK repository</h1>
          <h2>Installation (Alpine Linux)</h2>
          <pre>
          wget -qO /etc/apk/keys/vmvarela.rsa.pub \
            https://vmvarela.github.io/apk-packages/vmvarela.rsa.pub
          echo "https://vmvarela.github.io/apk-packages" >> /etc/apk/repositories
          apk update &amp;&amp; apk add sql-pipe
          </pre>
          </body>
          </html>
          HTML

      - name: List site contents
        run: find site/ -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
