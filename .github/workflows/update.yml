name: Update APK Repository

on:
  repository_dispatch:
    types: [update-sql-pipe]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v, e.g. 0.7.0)"
        required: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy APK repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Resolve version
        id: vars
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download .apk packages
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          mkdir -p site/x86_64 site/aarch64
          for APK_ARCH in x86_64 aarch64; do
            FILE="sql-pipe_${VERSION}_${APK_ARCH}.apk"
            URL="https://github.com/vmvarela/sql-pipe/releases/download/v${VERSION}/${FILE}"
            if curl -fsSL "${URL}" -o "site/${APK_ARCH}/${FILE}" 2>/dev/null; then
              echo "Downloaded ${FILE}"
            else
              echo "Skipped ${FILE} (not available)"
            fi
          done

      - name: Generate APKINDEX (Alpine Docker)
        run: |
          # Write script as a file — more reliable than Docker heredoc
          cat > /tmp/make_apkindex.sh << 'SCRIPT'
          #!/bin/sh
          set -e
          for ARCH in x86_64 aarch64; do
            APK_COUNT=$(ls /repo/${ARCH}/*.apk 2>/dev/null | wc -l)
            if [ "${APK_COUNT}" -eq 0 ]; then
              echo "No .apk files in ${ARCH}, skipping"
              continue
            fi
            apk --allow-untrusted index \
              --rewrite-arch "${ARCH}" \
              -o "/repo/${ARCH}/APKINDEX.tar.gz" \
              /repo/${ARCH}/*.apk
            echo "Created APKINDEX for ${ARCH} ($(wc -c < /repo/${ARCH}/APKINDEX.tar.gz) bytes)"
          done
          SCRIPT
          chmod +x /tmp/make_apkindex.sh

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/site:/repo" \
            -v "/tmp/make_apkindex.sh:/make_apkindex.sh:ro" \
            alpine:latest sh /make_apkindex.sh

          # Fix ownership (Docker container runs as root)
          sudo chown -R "${USER}:${USER}" "${GITHUB_WORKSPACE}/site/"
          ls -laR site/

      - name: Sign APKINDEX
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
          APK_SIGNING_KEY_PUB: ${{ secrets.APK_SIGNING_KEY_PUB }}
        run: |
          if [ -z "${APK_SIGNING_KEY}" ]; then
            echo "::warning::APK_SIGNING_KEY not set — APKINDEX will be unsigned"
            exit 0
          fi

          KEY_FILE="/tmp/vmvarela.rsa"
          printf '%s\n' "${APK_SIGNING_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"

          # Distribute public key
          printf '%s\n' "${APK_SIGNING_KEY_PUB}" > site/vmvarela.rsa.pub

          SIGNAME=".SIGN.RSA.vmvarela.rsa.pub"

          for ARCH in x86_64 aarch64; do
            INDEX="site/${ARCH}/APKINDEX.tar.gz"
            if [ ! -f "${INDEX}" ]; then
              continue
            fi
            # Alpine APK signature: SHA1+RSA signature prepended as tar.gz block
            openssl dgst -sha1 -sign "${KEY_FILE}" -out /tmp/apk.sig "${INDEX}"
            cp /tmp/apk.sig "/tmp/${SIGNAME}"
            (cd /tmp && tar -czf /tmp/sig_block.tar.gz "${SIGNAME}")
            cat /tmp/sig_block.tar.gz "${INDEX}" > "${INDEX}.signed"
            mv "${INDEX}.signed" "${INDEX}"
            echo "Signed APKINDEX for ${ARCH}: $(wc -c < ${INDEX}) bytes"
          done

      - name: Create index page
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>vmvarela APK repository</title></head>
          <body>
          <h1>vmvarela APK repository</h1>
          <h2>Installation (Alpine Linux)</h2>
          <pre>
          wget -qO /etc/apk/keys/vmvarela.rsa.pub \
            https://vmvarela.github.io/apk-packages/vmvarela.rsa.pub
          echo "https://vmvarela.github.io/apk-packages" >> /etc/apk/repositories
          apk update &amp;&amp; apk add sql-pipe
          </pre>
          </body>
          </html>
          HTML

      - name: List site contents
        run: find site/ -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
