name: Update APK Repository

on:
  repository_dispatch:
    types: [update-sql-pipe]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v, e.g. 0.7.0)"
        required: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy APK repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Resolve version
        id: vars
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download .apk packages
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          mkdir -p site/x86_64 site/aarch64
          for APK_ARCH in x86_64 aarch64; do
            FILE="sql-pipe_${VERSION}_${APK_ARCH}.apk"
            URL="https://github.com/vmvarela/sql-pipe/releases/download/v${VERSION}/${FILE}"
            if curl -fsSL "${URL}" -o "site/${APK_ARCH}/${FILE}" 2>/dev/null; then
              echo "Downloaded ${FILE}"
            else
              echo "Skipped ${FILE} (not available)"
            fi
          done

      - name: Generate and sign APKINDEX (Alpine Docker)
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
          APK_SIGNING_KEY_PUB: ${{ secrets.APK_SIGNING_KEY_PUB }}
        run: |
          # nfpm APKs lack builddate/origin in .PKGINFO, so apk index omits t:/o:.
          # We post-process the APKINDEX inside the container to add them.
          # We also use abuild-sign (inside the same container) for signing because
          # it produces the exact single-stream tar.gz format apk-tools 3.x requires.
          if [ -n "${APK_SIGNING_KEY}" ]; then
            printf '%s\n' "${APK_SIGNING_KEY}" > /tmp/vmvarela.rsa
            printf '%s\n' "${APK_SIGNING_KEY_PUB}" > /tmp/vmvarela.rsa.pub
            chmod 600 /tmp/vmvarela.rsa
          fi

          cat > /tmp/make_apkindex.sh << 'SCRIPT'
          #!/bin/sh
          set -e
          TS=$(date +%s)
          for ARCH in x86_64 aarch64; do
            APK_COUNT=$(ls /repo/${ARCH}/*.apk 2>/dev/null | wc -l)
            if [ "${APK_COUNT}" -eq 0 ]; then
              echo "No .apk files in ${ARCH}, skipping"
              continue
            fi

            # Generate raw APKINDEX (allow-untrusted = skip package sig check)
            apk --allow-untrusted index \
              --description "vmvarela APK repository" \
              --rewrite-arch "${ARCH}" \
              -o /tmp/APKINDEX_raw.tar.gz \
              /repo/${ARCH}/*.apk

            # Extract, patch missing fields (t: and o:), repack
            mkdir -p /tmp/apkwork && cd /tmp/apkwork
            tar -xzf /tmp/APKINDEX_raw.tar.gz

            # Add o: (origin=pkgname) and t: (build timestamp) after m: line
            awk -v ts="${TS}" '
              /^P:/ { pkgname=substr($0,3) }
              /^m:/ { print; printf "o:%s\nt:%s\n", pkgname, ts; next }
              { print }
            ' APKINDEX > APKINDEX.new && mv APKINDEX.new APKINDEX

            tar -czf "/repo/${ARCH}/APKINDEX.tar.gz" DESCRIPTION APKINDEX
            echo "Generated APKINDEX for ${ARCH}: $(wc -c < /repo/${ARCH}/APKINDEX.tar.gz) bytes"
            cd /

            # Sign with abuild-sign (produces the exact single-stream format apk 3.x requires)
            if [ -f /keys/vmvarela.rsa ]; then
              abuild-sign -q \
                -k /keys/vmvarela.rsa \
                -p vmvarela.rsa.pub \
                "/repo/${ARCH}/APKINDEX.tar.gz"
              echo "Signed APKINDEX for ${ARCH}: $(wc -c < /repo/${ARCH}/APKINDEX.tar.gz) bytes"
            else
              echo "::warning::APK_SIGNING_KEY not set — APKINDEX will be unsigned"
            fi
          done
          SCRIPT
          chmod +x /tmp/make_apkindex.sh

          # Distribute public key alongside the index
          if [ -f /tmp/vmvarela.rsa.pub ]; then
            cp /tmp/vmvarela.rsa.pub "${GITHUB_WORKSPACE}/site/vmvarela.rsa.pub"
          fi

          KEY_MOUNT=""
          if [ -f /tmp/vmvarela.rsa ]; then
            KEY_MOUNT="-v /tmp/vmvarela.rsa:/keys/vmvarela.rsa:ro -v /tmp/vmvarela.rsa.pub:/keys/vmvarela.rsa.pub:ro"
          fi

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/site:/repo" \
            -v "/tmp/make_apkindex.sh:/make_apkindex.sh:ro" \
            ${KEY_MOUNT} \
            alpine:latest sh -c "apk add --quiet abuild && sh /make_apkindex.sh"

          # Fix ownership (Docker container runs as root)
          sudo chown -R "${USER}:${USER}" "${GITHUB_WORKSPACE}/site/"
          ls -laR site/

      - name: Create index page
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>vmvarela APK repository</title></head>
          <body>
          <h1>vmvarela APK repository</h1>
          <h2>Installation (Alpine Linux)</h2>
          <pre>
          wget -qO /etc/apk/keys/vmvarela.rsa.pub \
            https://vmvarela.github.io/apk-packages/vmvarela.rsa.pub
          echo "https://vmvarela.github.io/apk-packages" >> /etc/apk/repositories
          apk update &amp;&amp; apk add sql-pipe
          </pre>
          </body>
          </html>
          HTML

      - name: List site contents
        run: find site/ -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
